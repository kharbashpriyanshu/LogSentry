name: LogSentry CI/CD Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ──────────────────────────────────────────────────────────
  # Job 1: Code Quality & Security
  # ──────────────────────────────────────────────────────────
  quality:
    name: Code Quality & Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install quality tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy bandit pip-audit
          pip install -r requirements-dev.txt

      - name: Lint with Ruff
        run: ruff check . --output-format=github

      - name: Check formatting with Black
        run: black --check --diff .

      - name: Type checking with MyPy
        run: mypy app --ignore-missing-imports
        continue-on-error: true  # Non-blocking in CI until full typing is complete

      - name: Security scan with Bandit
        run: |
          bandit -r app/ \
            --severity-level medium \
            --confidence-level medium \
            --format json \
            --output bandit-report.json \
            || true
          bandit -r app/ \
            --severity-level high \
            --confidence-level high

      - name: Dependency vulnerability audit
        run: pip-audit --requirement requirements.txt --format json --output pip-audit-report.json
        continue-on-error: true  # Report but don't block if audit fails

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            pip-audit-report.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  # Job 2: Tests & Coverage
  # ──────────────────────────────────────────────────────────
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        env:
          ENVIRONMENT: development
          AI_PROVIDER: openai
          LOG_FILE_PATH: logs/test.log
        run: |
          python -m pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=65 \
            -v \
            --tb=short

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  # Job 3: Docker Build Validation
  # ──────────────────────────────────────────────────────────
  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: logsentry:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: runtime

      - name: Verify image starts correctly
        run: |
          docker run --rm \
            -e ENVIRONMENT=development \
            -e AI_PROVIDER=openai \
            -e LOG_FILE_PATH=/tmp/test.log \
            -d --name logsentry_ci \
            -p 8000:8000 \
            logsentry:ci-${{ github.sha }}
          
          # Wait for startup
          sleep 10
          
          # Smoke test: liveness probe
          curl --retry 5 --retry-delay 2 -f http://localhost:8000/liveness
          
          # Smoke test: readiness probe
          curl --retry 5 --retry-delay 2 -f http://localhost:8000/readiness
          
          docker stop logsentry_ci

  # ──────────────────────────────────────────────────────────
  # Job 4: Build Summary
  # ──────────────────────────────────────────────────────────
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [quality, test, docker]
    if: always()

    steps:
      - name: Report pipeline result
        run: |
          echo "## LogSentry CI/CD Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality & Security | ${{ needs.quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests & Coverage | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.docker.result }} |" >> $GITHUB_STEP_SUMMARY
