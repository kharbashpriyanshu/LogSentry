version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=logsentry_db
      - POSTGRES_PORT=5432
      - DATABASE_URI=postgresql://postgres:postgres@db:5432/logsentry_db
    depends_on:
      - db
    volumes:
      - .:/app

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=logsentry_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
